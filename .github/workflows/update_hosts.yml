name: Monthly Hosts Update
on:
  schedule:
    - cron: '0 3 1 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download blocklists and build hosts file
        run: |
          curl -fsSL "http://dsi.ut-capitole.fr/blacklists/download/all.tar.gz" -o ut1_all.tar.gz

          # Extract only categories that exist in the archive.
          # adult (4.6M entries) is skipped — covered by NextDNS native lists.
          # erotism and imagehosting do not exist in this archive.
          for category in lingerie manga mixed_adult warez filehosting; do
            tar -xzOf ut1_all.tar.gz "blacklists/${category}/domains" 2>/dev/null \
              | awk 'NF && !/^#/ { print "0.0.0.0 " $1 }' >> ut1.txt || true
          done

          cat ut1.txt custom_additions.txt \
            | grep -v "^#" \
            | grep -v "^[[:space:]]*$" \
            | sort -u \
            > hosts_block.txt

          echo "# Generated $(date -u). Entries: $(wc -l < hosts_block.txt)" \
            | cat - hosts_block.txt > tmp && mv tmp hosts_block.txt

          rm -f ut1_all.tar.gz ut1.txt

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add hosts_block.txt
          git diff --staged --quiet || git commit -m "Monthly update $(date -u +%Y-%m-%d)"
          git push
