name: Monthly Hosts Update
on:
  schedule:
    - cron: '0 3 1 * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download UT1 blocklists from tarball
        run: |
          mkdir -p ut1_extract
          curl -fsSL "https://dsi.ut-capitole.fr/blacklists/download/blacklists.tar.gz" \
            | tar -xz -C ut1_extract 2>/dev/null || true
          find ut1_extract -name "domains" \
            | grep -E "/(lingerie|adult|erotism)/" \
            | xargs cat 2>/dev/null \
            | awk '{print "0.0.0.0 " $1}' > ut1.txt
          echo "UT1 entries: $(wc -l < ut1.txt)"
          rm -rf ut1_extract

      - name: Build hosts file
        run: |
          cat ut1.txt custom_additions.txt \
            | grep -v "^#" \
            | grep -v "^$" \
            | sort -u \
            > hosts_block.txt
          echo "# Generated $(date -u). Entries: $(wc -l < hosts_block.txt)" \
            | cat - hosts_block.txt > tmp && mv tmp hosts_block.txt

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add hosts_block.txt
          git diff --staged --quiet || git commit -m "Monthly update $(date -u +%Y-%m-%d)"
          git push
