name: Monthly Hosts Update
on:
  schedule:
    - cron: '0 3 1 * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download blocklists and build hosts file
        run: |
          # UT1 Blacklist categories
          for category in lingerie adult erotism imagehosting manga mixed_adult warez; do
            curl -fsSL "https://dsi.ut-capitole.fr/blacklists/download/blacklists/${category}/domains" \
              | awk '{print "0.0.0.0 " $1}' >> ut1.txt
          done

          # Merge with custom additions; deduplicate
          cat ut1.txt custom_additions.txt \
            | grep -v "^#" \
            | grep -v "^$" \
            | sort -u \
            > hosts_block.txt

          echo "# Generated $(date -u). Entries: $(wc -l < hosts_block.txt)" \
            | cat - hosts_block.txt > tmp && mv tmp hosts_block.txt
          echo "Final entries: $(grep -c '^0\.0\.0\.0' hosts_block.txt)"

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add hosts_block.txt
          git diff --staged --quiet || git commit -m "Monthly update $(date -u +%Y-%m-%d)"
          git push
